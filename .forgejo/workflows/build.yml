name: Build

on: [workflow_dispatch]

env:
  app_file: Chromium-WinUpdater

jobs:
  build:
    runs-on: codeberg-small
    container:
      image: scottyhardy/docker-wine:stable
    steps:
      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs zip

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Ahk2Exe
        env:
          DL_AUTOHOTKEY: ${{ vars.DL_AUTOHOTKEY }}
          SHA_AUTOHOTKEY: ${{ vars.SHA_AUTOHOTKEY }}
        run: |
          wget -qO ahk.zip ${{ env.DL_AUTOHOTKEY }}
          echo "${{ env.SHA_AUTOHOTKEY }} ahk.zip" | sha256sum -c || exit 1
          unzip -j ahk.zip Compiler/Ahk2Exe.exe "Compiler/Unicode 32-bit.bin"
          rm ahk.zip

      - name: Set up Resource Hacker
        env:
          DL_RESHACKER: ${{ vars.DL_RESHACKER }}
          SHA_RESHACKER: ${{ vars.SHA_RESHACKER }}
        run: |
          wget -qO rh.zip ${{ env.DL_RESHACKER }}
          echo "${{ env.SHA_RESHACKER }} rh.zip" | sha256sum -c || exit 1
          unzip rh.zip ResourceHacker.exe
          rm rh.zip

      - name: Download 7za
        env:
          DL_7ZA: ${{ vars.DL_7ZA }}
          SHA_7ZA: ${{ vars.SHA_7ZA }}
        run: |
          wget -qO 7za.zip ${{ env.DL_7ZA }}
          echo "${{ env.SHA_7ZA }} 7za.zip" | sha256sum -c || exit 1
          unzip 7za.zip
          rm 7za.zip

      - name: Build executable
        run: |
          xvfb-run wine Ahk2Exe.exe /silent verbose /in ${{ env.APP_FILE }}.ahk

      - id: virustotal
        if: ${{ secrets.VT_API_KEY != '' }}
        name: Scan with VirusTotal
        uses: https://github.com/crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./${{ env.APP_FILE }}.exe

      - name: Create zip
        run: |
          APP_VERSION=$(grep -oP "SetFileVersion \K[\d.]+" ${{ env.APP_FILE }}.ahk)
          mkdir ./dist
          zip ./dist/${{ env.APP_FILE }}_${APP_VERSION}.zip ${{ env.APP_FILE }}.exe ${{ env.APP_FILE }}.url *.ps1 *.template.ini 7za-License.txt

      - name: Upload artifacts
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          path: |
            dist/${{ env.APP_FILE }}*.zip
          retention-days: 7
